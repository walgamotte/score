name: Android CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Dynamically Locate or Generate Gradle Wrapper
      run: |
        # Check if project files are inside a nested subdirectory
        if [ -f "DiscGolfScorer/gradlew" ]; then
          cd DiscGolfScorer
        elif [ -f "app/build.gradle" ] || [ -f "app/build.gradle.kts" ]; then
          echo "Root folder contains app modules but missing gradlew wrapper. Generating runner..."
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload Finished APK File
      uses: actions/upload-artifact@v4
      with:
        name: DiscGolfScorecard
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/debug/*.apk
          
